<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F43F5E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Arcus Archery" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Arcus Digital | Archery Scoring System</title>
  </head>
  <body>
    <div id="root">
      <div id="loading-fallback" style="position: fixed; inset: 0; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-family: sans-serif; gap: 24px; z-index: 10;">
        <div style="position: relative;">
          <div style="position: absolute; inset: -20px; background: #ef4444; border-radius: 50%; blur: 40px; opacity: 0.1;"></div>
          <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: pulse 2s infinite;"><path d="m12 14 4-4"/><path d="m3.34 7 10 10"/><path d="m17 21 4-4"/><path d="m2 14h20"/><path d="m20 8-5 5"/><path d="m5 22 5-5"/><path d="m12 10-6 6"></path></svg>
        </div>
        <div style="text-align: center;">
          <h2 style="font-weight: 900; letter-spacing: 0.1em; margin: 0; text-transform: uppercase; font-size: 14px;">Memuat Arcus Digital</h2>
          <p style="font-size: 10px; opacity: 0.4; letter-spacing: 0.3em; margin-top: 8px; text-transform: uppercase;">Menyiapkan Arena...</p>
        </div>
        <div style="width: 40px; height: 3px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden;">
          <div style="width: 100%; height: 100%; background: #ef4444; transform: translateX(-100%); animation: slide 1.5s infinite;"></div>
        </div>
      </div>
    </div>
    
    <style>
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
      @keyframes slide { 0% { transform: translateX(-100%); } 50% { transform: translateX(0); } 100% { transform: translateX(100%); } }
    </style>

    <script>
      // Force remove fallback if app mounts
      window.addEventListener('load', function() {
        var observer = new MutationObserver(function(mutations) {
          var fallback = document.getElementById('loading-fallback');
          if (fallback && document.getElementById('root').children.length > 1) {
             fallback.style.display = 'none';
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
      });

      // Fallback if the module doesn't load after 10 seconds
      setTimeout(function() {
        var fallback = document.getElementById('loading-fallback');
        if (fallback) {
          fallback.innerHTML = '<div style="background: #991b1b; padding: 40px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 400px;">' +
            '<h1 style="font-weight: 900; text-transform: uppercase; margin-bottom: 8px;">Gagal Memuat</h1>' +
            '<p style="font-size: 12px; opacity: 0.8; margin-bottom: 24px; line-height: 1.6;">Browser (Hola/Bawaan HP) mungkin tidak mendukung sistem ini. Silakan gunakan <b>Google Chrome</b> atau <b>Safari</b> terbaru.</p>' +
            '<button onclick="window.location.reload()" style="background: white; color: #991b1b; border: none; padding: 16px; border-radius: 12px; font-weight: 900; font-size: 11px; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 0.1em;">MUAT ULANG</button>' +
            '<p style="font-size: 9px; opacity: 0.4; margin-top: 16px; text-transform: uppercase;">Error: Module Load Timeout</p>' +
            '</div>';
        }
      }, 15000);
    </script>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
